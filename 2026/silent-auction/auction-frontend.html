<!-- SILENT AUCTION FRONTEND -->
<!-- Add this code to a Custom HTML block in WordPress -->
<div id="ccor-silent-auction-wrapper">
<style>
  #ccor-silent-auction-wrapper {
    --auction-primary: #1B449D;
    --auction-secondary: #64BAB0;
    --auction-bg: #f9f9f9;
    --auction-text: #333;
    font-family: 'Inter', sans-serif;
    color: var(--auction-text);
  }

  #ccor-silent-auction-wrapper * {
    box-sizing: border-box;
  }

  #ccor-silent-auction-wrapper .auction-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 20px;
    background-color: var(--auction-primary);
    background-image: url('https://coconutcoastrealtors.org/wp-content/uploads/2025/12/Untitled-design-10-scaled-1.png');
    background-size: cover; 
    background-position: center; 
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  #ccor-silent-auction-wrapper .auction-header-img {
    max-height: 80px; 
    object-fit: contain; 
    filter: brightness(0) invert(1);
    margin: 0 !important;
  }

  #ccor-silent-auction-wrapper .auction-header-right {
    text-align: right;
  }

  #ccor-silent-auction-wrapper .auction-header h2 {
    margin: 0 0 10px 0 !important; 
    color: white !important; 
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    font-size: 28px !important;
    font-weight: bold !important;
    line-height: 1.2 !important;
  }

  #ccor-silent-auction-wrapper .auction-timer {
    font-size: 16px;
    font-weight: 600;
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  #ccor-silent-auction-wrapper .timer-bar {
    width: 100px;
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  #ccor-silent-auction-wrapper .timer-fill {
    height: 100%;
    background: white;
    transition: width 1s linear;
  }

  #ccor-silent-auction-wrapper .auction-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
  }

  #ccor-silent-auction-wrapper .auction-card {
    background: #fff !important;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
    transition: transform 0.2s ease;
    display: flex;
    flex-direction: column;
    border: 1px solid #eaeaea;
  }

  #ccor-silent-auction-wrapper .auction-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.12) !important;
  }

  #ccor-silent-auction-wrapper .auction-img-wrapper {
    position: relative;
    width: 100%;
    padding-top: 75%; /* 4:3 Aspect Ratio */
    background: #f0f0f0;
    overflow: hidden;
  }

  #ccor-silent-auction-wrapper .auction-img {
    position: absolute !important;
    top: 0 !important; 
    left: 0 !important; 
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    margin: 0 !important;
    max-width: none !important;
    max-height: none !important;
    border-radius: 0 !important;
  }

  #ccor-silent-auction-wrapper .auction-content {
    padding: 20px !important;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    background: #fff !important;
  }

  #ccor-silent-auction-wrapper .auction-title {
    font-size: 20px !important;
    font-weight: 700 !important;
    margin: 0 0 5px 0 !important;
    color: var(--auction-primary) !important;
    line-height: 1.3 !important;
  }

  #ccor-silent-auction-wrapper .auction-dims {
    font-size: 13px !important;
    color: #777 !important;
    margin: 0 0 15px 0 !important;
    line-height: 1.2 !important;
  }

  #ccor-silent-auction-wrapper .auction-desc {
    font-size: 14px !important;
    color: #555 !important;
    line-height: 1.5 !important;
    margin: 0 0 20px 0 !important;
    flex-grow: 1;
  }

  #ccor-silent-auction-wrapper .auction-bid-info {
    background: var(--auction-bg) !important;
    padding: 15px !important;
    border-radius: 8px !important;
    text-align: center !important;
    margin: 0 0 15px 0 !important;
    border: 1px solid #eee;
  }

  #ccor-silent-auction-wrapper .current-bid {
    font-size: 28px !important;
    font-weight: 800 !important;
    color: var(--auction-primary) !important;
    margin: 0 !important;
    line-height: 1 !important;
  }

  #ccor-silent-auction-wrapper .highest-bidder {
    font-size: 13px !important;
    color: #666 !important;
    margin: 5px 0 0 0 !important;
    line-height: 1.2 !important;
  }

  #ccor-silent-auction-wrapper .btn-bid {
    background: var(--auction-primary) !important;
    color: white !important;
    border: none !important;
    padding: 12px !important;
    font-size: 16px !important;
    font-weight: 600 !important;
    border-radius: 6px !important;
    cursor: pointer !important;
    width: 100% !important;
    transition: background 0.2s !important;
    text-align: center !important;
    display: block !important;
    line-height: normal !important;
    text-decoration: none !important;
  }

  #ccor-silent-auction-wrapper .btn-bid:hover {
    background: #122e6b !important;
  }

  /* MODAL STYLES */
  #ccor-silent-auction-wrapper .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999999;
  }

  #ccor-silent-auction-wrapper .modal-overlay.active {
    display: flex;
  }

  #ccor-silent-auction-wrapper .bid-modal {
    background: white !important;
    padding: 30px !important;
    border-radius: 12px !important;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }

  #ccor-silent-auction-wrapper .modal-close {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none !important;
    border: none !important;
    font-size: 28px !important;
    cursor: pointer !important;
    color: #999 !important;
    line-height: 1 !important;
    padding: 0 !important;
  }

  #ccor-silent-auction-wrapper .modal-title {
    margin: 0 0 5px 0 !important;
    color: var(--auction-primary) !important;
    font-size: 24px !important;
    font-weight: bold !important;
  }

  #ccor-silent-auction-wrapper .form-group {
    margin-bottom: 15px !important;
  }

  #ccor-silent-auction-wrapper .form-group label {
    display: block !important;
    margin-bottom: 5px !important;
    font-weight: 600 !important;
    font-size: 14px !important;
    color: #333 !important;
  }

  #ccor-silent-auction-wrapper .form-group input {
    width: 100% !important;
    padding: 10px !important;
    border: 1px solid #ccc !important;
    border-radius: 6px !important;
    font-size: 16px !important;
    box-sizing: border-box !important;
    background: #fff !important;
    color: #333 !important;
    margin: 0 !important;
  }

  #ccor-silent-auction-wrapper .form-row {
    display: flex;
    gap: 15px;
  }
  #ccor-silent-auction-wrapper .form-row .form-group {
    flex: 1;
    margin-bottom: 15px !important;
  }

  #ccor-silent-auction-wrapper .min-bid-notice {
    font-size: 13px !important;
    color: #d9534f !important;
    margin: 0 0 15px 0 !important;
  }

  /* Responsive Adjustments */
  @media (max-width: 768px) {
    #ccor-silent-auction-wrapper .auction-header {
      flex-direction: column;
      text-align: center;
      padding: 15px;
    }
    #ccor-silent-auction-wrapper .auction-header-img {
      margin-bottom: 15px;
    }
    #ccor-silent-auction-wrapper .auction-header-right {
      text-align: center;
    }
    #ccor-silent-auction-wrapper .auction-timer {
      justify-content: center;
    }
    #ccor-silent-auction-wrapper .auction-grid {
      grid-template-columns: 1fr;
    }
    #ccor-silent-auction-wrapper .form-row {
      flex-direction: column;
      gap: 0;
    }
  }
</style>

<div class="auction-header">
  <img src="https://coconutcoastrealtors.org/wp-content/uploads/2026/04/CCOR-Vert-Logo-no-tag-clr-scaled-e1776958694707.png" class="auction-header-img" alt="CCOR Logo">
  <div class="auction-header-right">
    <h2>Silent Auction</h2>
    <div class="auction-timer">
      Updates in: <span id="ccor-sa-time-left">30</span>s
      <div class="timer-bar"><div class="timer-fill" id="ccor-sa-timer-fill"></div></div>
    </div>
  </div>
</div>

<div class="auction-grid" id="ccor-sa-auction-grid">
  <!-- Items will be injected here via JS -->
  <h3 style="text-align:center; width:100%; grid-column: 1 / -1;">Loading auction items...</h3>
</div>

<!-- Bid Modal -->
<div class="modal-overlay" id="ccor-sa-modal-overlay">
  <div class="bid-modal">
    <button class="modal-close" id="ccor-sa-modal-close">&times;</button>
    <h3 class="modal-title" id="ccor-sa-modal-item-name">Place Bid</h3>
    <p class="min-bid-notice" id="ccor-sa-modal-min-bid">Minimum next bid: $<span>0</span></p>

    <form id="ccor-sa-bid-form">
      <input type="hidden" id="ccor-sa-bid-item-id">
      
      <div class="form-group">
        <label>Bid Amount ($)</label>
        <input type="number" id="ccor-sa-bid-amount" required min="1">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="ccor-sa-bid-fname" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="ccor-sa-bid-lname" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="ccor-sa-bid-email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="ccor-sa-bid-phone" required>
      </div>

      <button type="submit" class="btn-bid" id="ccor-sa-btn-submit-bid">Submit Bid</button>
    </form>
  </div>
</div>
</div> <!-- End Wrapper -->

<script>
// Prevent polluting global namespace and wait for DOM
(function() {
  const API_URL = "https://auction-api.bonitaspringsrealtors.workers.dev"; 

  let auctionItems = [];
  let refreshInterval;
  let timerInterval;
  let secondsLeft = 30;

  async function fetchAuctionState() {
    try {
      const response = await fetch(`${API_URL}/api/auction-state`);
      if (!response.ok) throw new Error("Failed to fetch");
      auctionItems = await response.json();
      renderItems();
    } catch (error) {
      console.error("Error fetching auction state:", error);
      if(auctionItems.length === 0) {
          const grid = document.getElementById('ccor-sa-auction-grid');
          if (grid) grid.innerHTML = '<p style="text-align:center;width:100%;color:red;">Error loading items. Please check your connection.</p>';
      }
    }
  }

  function renderItems() {
    const grid = document.getElementById('ccor-sa-auction-grid');
    if (!grid) return;
    grid.innerHTML = '';

    auctionItems.forEach(item => {
      const currentBid = item.current_bid ? item.current_bid : item.starting_bid;
      const isStarted = !!item.current_bid;

      const card = document.createElement('div');
      card.className = 'auction-card';
      
      const highestBidderText = isStarted ? `Highest Bidder: ${item.highest_bidder}` : `Starting Bid`;

      card.innerHTML = `
        <div class="auction-img-wrapper">
          <img src="${item.image_url}" class="auction-img" alt="${item.name}">
        </div>
        <div class="auction-content">
          <h3 class="auction-title">${item.title_placeholder !== '[Title Placeholder]' ? item.title_placeholder : item.name}</h3>
          <div class="auction-dims">Original: ${item.original_name} | ${item.dimensions}</div>
          <p class="auction-desc">${item.desc_placeholder}</p>
          
          <div class="auction-bid-info">
            <p class="current-bid">$${currentBid}</p>
            <p class="highest-bidder">${highestBidderText}</p>
          </div>

          <button class="btn-bid" data-item-id="${item.id}">Place Bid</button>
        </div>
      `;
      grid.appendChild(card);
    });

    // Attach event listeners safely to new buttons
    const bidButtons = grid.querySelectorAll('.btn-bid');
    bidButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(e.target.getAttribute('data-item-id'), 10);
        openBidModal(id);
      });
    });
  }

  function startTimer() {
    const timeSpan = document.getElementById('ccor-sa-time-left');
    const fillBar = document.getElementById('ccor-sa-timer-fill');
    if (!timeSpan || !fillBar) return;

    clearInterval(timerInterval);
    
    secondsLeft = 30;
    
    timerInterval = setInterval(() => {
      secondsLeft--;
      timeSpan.innerText = secondsLeft;
      fillBar.style.width = `${(secondsLeft / 30) * 100}%`;

      if (secondsLeft <= 0) {
        secondsLeft = 30;
        fetchAuctionState();
      }
    }, 1000);
  }

  function openBidModal(itemId) {
    const item = auctionItems.find(i => i.id === itemId);
    if (!item) return;

    const minBid = item.current_bid ? item.current_bid + 5 : item.starting_bid; 

    document.getElementById('ccor-sa-bid-item-id').value = item.id;
    document.getElementById('ccor-sa-modal-item-name').innerText = `Bid on: ${item.name}`;
    document.querySelector('#ccor-sa-modal-min-bid span').innerText = minBid;
    document.getElementById('ccor-sa-bid-amount').min = minBid;
    document.getElementById('ccor-sa-bid-amount').value = minBid;

    document.getElementById('ccor-sa-modal-overlay').classList.add('active');
  }

  // Setup DOM event listeners safely
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('ccor-sa-modal-overlay');
    const closeBtn = document.getElementById('ccor-sa-modal-close');
    const bidForm = document.getElementById('ccor-sa-bid-form');

    if (closeBtn) closeBtn.onclick = () => modal.classList.remove('active');
    if (modal) {
      modal.onclick = (e) => {
        if(e.target === modal) modal.classList.remove('active');
      }
    }

    if (bidForm) {
      bidForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('ccor-sa-btn-submit-bid');
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        const payload = {
          item_id: document.getElementById('ccor-sa-bid-item-id').value,
          amount: parseInt(document.getElementById('ccor-sa-bid-amount').value, 10),
          first_name: document.getElementById('ccor-sa-bid-fname').value,
          last_name: document.getElementById('ccor-sa-bid-lname').value,
          email: document.getElementById('ccor-sa-bid-email').value,
          phone: document.getElementById('ccor-sa-bid-phone').value,
        };

        try {
          const response = await fetch(`${API_URL}/api/bid`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (response.ok) {
            alert("Bid placed successfully!");
            modal.classList.remove('active');
            bidForm.reset();
            fetchAuctionState(); 
            secondsLeft = 30;
          } else {
            alert(`Error: ${data.error}`);
            if (data.current_highest) {
               fetchAuctionState(); 
            }
          }
        } catch (err) {
          alert("Network error. Please try again.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Submit Bid";
        }
      };
    }

    // Initialization
    fetchAuctionState();
    startTimer();
  });

  // Fallback in case DOMContentLoaded already fired before this script loaded (often true for async blocks)
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(() => {
          const grid = document.getElementById('ccor-sa-auction-grid');
          if (grid && auctionItems.length === 0) {
              fetchAuctionState();
              startTimer();
          }
      }, 100);
  }

})();
</script>
