<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Auction Admin Dashboard</title>
  <style>
    body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    h1, h2 { color: #1B449D; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background-color: #1B449D; color: white; }
    tr:hover { background-color: #f9f9f9; }
    .container { max-width: 1200px; margin: 0 auto; }
    .badge { background: #28a745; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

<div class="container" id="admin-container">
  <h1>Silent Auction Admin</h1>
  
  <table>
    <thead>
      <tr>
        <th>Item Name</th>
        <th>Bid Amount</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Time Placed</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bids-body">
      <tr><td colspan="8" style="text-align:center;">Loading bids...</td></tr>
    </tbody>
  </table>
</div>

<script>
const API_URL = "https://auction-api.bonitaspringsrealtors.workers.dev";

async function fetchBids() {
  try {
    const response = await fetch(`${API_URL}/api/admin/bids`);
    
    if (!response.ok) throw new Error("Failed to fetch bids from server.");

    const bids = await response.json();
    
    const tbody = document.getElementById('bids-body');
    tbody.innerHTML = '';
    
    if(bids.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No bids placed yet.</td></tr>';
        return;
    }

    // Keep track of highest bid per item to highlight it
    const highestBids = {};
    bids.forEach(b => {
        if(!highestBids[b.item_id] || b.amount > highestBids[b.item_id]) {
            highestBids[b.item_id] = b.amount;
        }
    });

    bids.forEach(bid => {
      const isHighest = bid.amount === highestBids[bid.item_id];
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><strong>${bid.item_name}</strong></td>
        <td><span class="${isHighest ? 'badge' : ''}">$${bid.amount}</span></td>
        <td>${bid.first_name}</td>
        <td>${bid.last_name}</td>
        <td><a href="mailto:${bid.email}">${bid.email}</a></td>
        <td><a href="tel:${bid.phone}">${bid.phone}</a></td>
        <td style="color:#666; font-size:13px;">${new Date(bid.created_at + 'Z').toLocaleString()}</td>
        <td><button style="background:#dc3545; color: white; border: none; border-radius: 4px; padding: 6px 12px; font-size: 13px; cursor: pointer;" onclick="deleteBid(${bid.id})">Delete</button></td>
      `;
      tbody.appendChild(row);
    });

  } catch (error) {
    alert("Error: " + error.message);
  }
}

async function deleteBid(id) {
  const code = prompt("Enter delete code:");
  if (code !== 'bear1996!') {
      if (code) alert("Incorrect code.");
      return;
  }

  try {
    const response = await fetch(`${API_URL}/api/admin/bid/${id}?secret=${encodeURIComponent(code)}`, {
      method: 'DELETE'
    });
    if (!response.ok) throw new Error("Failed to delete bid");
    alert("Bid deleted successfully.");
    fetchBids(); // Refresh the table
  } catch (err) {
    alert(err.message);
  }
}

// Fetch bids on load
fetchBids();
</script>
</body>
</html>
