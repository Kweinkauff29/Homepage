<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>CCOR – Members DB Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0c10;
      color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #151821;
      border-radius: 16px;
      padding: 24px 28px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #b4b8c5;
      margin: 0 0 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
    }

    input[type="file"],
    input[type="password"] {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #303548;
      background: #10131a;
      color: #f5f7fa;
      font-size: 0.9rem;
      box-sizing: border-box;
      margin-bottom: 0.75rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: none;
      border-radius: 999px;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #e0002a;
      color: #fff;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      min-height: 1.5em;
    }

    .status.ok {
      color: #8bffb3;
    }

    .status.err {
      color: #ff7a7a;
    }

    .hint {
      font-size: 0.8rem;
      color: #8b90a3;
      margin-bottom: 1rem;
    }
  </style>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

  <div class="card">
    <h1>Members DB Upload <span style="font-size:0.6em; color:#888; margin-left:10px;">v2 (Tags Support)</span></h1>
    <p>Upload the latest <strong>Members Report(4).xlsx</strong> to refresh the Letter of Good Standing database.</p>

    <div class="hint">
      This will <strong>replace all existing rows</strong> in the D1 database.
    </div>

    <label for="adminKey">Admin key</label>
    <input type="password" id="adminKey" placeholder="Enter admin upload key" />

    <label for="fileInput">Members report (.xlsx)</label>
    <input type="file" id="fileInput" accept=".xlsx" />

    <button id="uploadBtn">Upload &amp; Replace</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const API_BASE = "https://ber-logs-api.bonitaspringsrealtors.workers.dev";

    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const adminKeyInput = document.getElementById("adminKey");
    const statusEl = document.getElementById("status");

    function setStatus(msg, type = "") {
      statusEl.textContent = msg;
      statusEl.className = "status " + (type || "");
    }

    async function handleUpload() {
      const file = fileInput.files[0];
      const adminKey = adminKeyInput.value.trim();

      if (!adminKey) {
        setStatus("Please enter the admin key.", "err");
        return;
      }

      if (!file) {
        setStatus("Please select a .xlsx file to upload.", "err");
        return;
      }

      uploadBtn.disabled = true;
      setStatus("Reading spreadsheet...", "");

      try {
        const rows = await readXlsxFile(file);

        if (!rows.length) {
          setStatus("No rows found in the spreadsheet.", "err");
          uploadBtn.disabled = false;
          return;
        }

        setStatus(`Parsed ${rows.length} rows. Uploading to server...`, "");

        const res = await fetch(`${API_BASE}/api/upload-members`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            adminKey,
            rows,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.success) {
          throw new Error(data.error || `Upload failed with status ${res.status}`);
        }

        setStatus(`Success! Inserted ${data.inserted} members.`, "ok");
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, "err");
      } finally {
        uploadBtn.disabled = false;
      }
    }

    function readXlsxFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: "array" });
            const firstSheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[firstSheetName];

            // Use header:1 to get array of arrays, so we can trim headers manually
            const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

            if (!rawData || rawData.length < 2) {
              resolve([]);
              return;
            }

            // Normalize headers: trim and lowercase for easier matching
            const headers = rawData[0].map(h => String(h || "").trim());
            const rows = rawData.slice(1);

            // Helper to get value by header name (case-insensitive)
            const getValue = (rowArray, headerName) => {
              const idx = headers.findIndex(h => h.toLowerCase() === headerName.toLowerCase());
              return idx !== -1 ? rowArray[idx] : null;
            };

            const normalized = rows.map((row) => ({
              contactId: getValue(row, "ContactId"),
              nrdsId: getValue(row, "NRDS Id"),
              fullName: getValue(row, "Contact Name"),
              contactType: getValue(row, "Contact Type"),
              membershipStatus: getValue(row, "Contact Membership Status"),
              officeName: getValue(row, "Primary/Contact Name"),
              coeLatestDate: getValue(row, "Code of Ethics Latest Date"),
              primaryAddress1: getValue(row, "Primary Contact Address 1"),
              primaryAddress2: getValue(row, "Primary Contact Address 2"),
              memberships: getValue(row, "Memberships"),
              tags: getValue(row, "Tags"),
              contactBalance: getValue(row, "Contact Balance"),
            }));

            // Filter out empty rows
            const filtered = normalized.filter((r) => r.nrdsId || r.fullName);

            console.log("Parsed rows preview:", filtered.slice(0, 3));
            resolve(filtered);
          } catch (err) {
            reject(err);
          }
        };

        reader.onerror = (err) => reject(err);

        reader.readAsArrayBuffer(file);
      });
    }

    uploadBtn.addEventListener("click", handleUpload);
  </script>



















<div id="ccor-waves-bg" aria-hidden="true" style="position: fixed; inset: 0; z-index: -9999; pointer-events: none; opacity: 0.45; overflow: hidden; background: #ffffff;">
  <div class="ccor-wave-container ccor-ribbon-bottom" style="position: absolute; inset: 0;"></div>
</div>
<style>
  @keyframes ribbonFlow {
    0% { background-position: 0% 0; }
    100% { background-position: 400% 0; }
  }
  .ccor-wave {
    position: absolute;
    width: 400%;
    height: 600px; 
    left: -150%;
    background: linear-gradient(120deg, #1B449D 0%, #2e5ab8 8%, #3d6cd1 16%, #64BAB0 24%, #8dd4ca 32%, #a6e1d9 40%, #D4AC6C 48%, #e8c88a 56%, #f2dcb3 64%, #5B5A5C 72%, #7a7a7a 80%, #64BAB0 88%, #4da69a 94%, #1B449D 100%);
    background-size: 400% 100%;
    animation: ribbonFlow 15s ease-in-out infinite alternate;
    border-radius: 42% 45% 40% 43%;
    filter: blur(0.4px);
    will-change: transform;
    transform-origin: center bottom;
  }
  .ccor-ribbon-bottom .ccor-wave { 
    bottom: -600px; 
  }
  
  /* MOBILE OPTIMIZATIONS */
  @media (max-width: 768px) {
    .ccor-wave { height: 400px; bottom: -400px !important; }
  }

  /* FORCE TRANSPARENCY ON HOST CONTAINERS */
  html { background-color: #ffffff !important; }
  body, .site, #page, .site-content, #content, .entry-content, .joinber-page, .ber-about, #main, .main-container, .wrapper, 
  .ber-directory, .container, .main-content, .directory-grid, .controls, .section, main {
    background-color: transparent !important;
    background: transparent !important;
  }
</style>
<script>
  (function() {
    function initCcorWaves() {
        const root = document.getElementById('ccor-waves-bg');
        if (!root) return;
        const containers = root.querySelectorAll('.ccor-wave-container');
        containers.forEach(container => {
            const waveCount = 13; 
            const waves = [];
            for (let i = 0; i < waveCount; i++) {
                const wave = document.createElement('div');
                wave.className = 'ccor-wave';
                wave.style.borderRadius = (38 + Math.random() * 10) + '%';
                wave.style.opacity = 0.15 + (Math.random() * 0.3);
                wave.style.zIndex = waveCount - i; 
                
                container.appendChild(wave);
                waves.push({ 
                    el: wave, 
                    phase: Math.random() * Math.PI * 2, 
                    phaseSpeed: 0.0006 + (Math.random() * 0.0015), 
                    offset: i * (window.innerWidth < 768 ? 10 : 25), 
                    amplitude: 15 + (Math.random() * 25), 
                    driftAmount: 60 + (Math.random() * 100),
                    rotationOffset: (Math.random() - 0.5) * 4
                });
            }
            function animate() {
                const isMobile = window.innerWidth < 768;
                waves.forEach((w, i) => {
                    w.phase += w.phaseSpeed;
                    const drift = Math.sin(w.phase * 0.4) * (isMobile ? w.driftAmount / 2 : w.driftAmount);
                    const undulation = Math.sin(w.phase) * (isMobile ? w.amplitude * 0.7 : w.amplitude);
                    
                    const totalY = undulation + w.offset;
                    const rot = w.rotationOffset + (Math.cos(w.phase * 0.6) * 3);
                    const transform = "translateX("+drift+"px) translateY("+(-totalY)+"px) rotate("+rot+"deg) scaleX("+ (isMobile ? 1.6 : 1.4) +")";
                    
                    w.el.style.transform = transform;
                });
                requestAnimationFrame(animate);
            }
            animate();
        });
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initCcorWaves); }
    else { initCcorWaves(); }
  })();
</script>

</body>

</html>
